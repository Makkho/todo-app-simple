<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODO Application</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 30px;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        #todoInput {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 16px;
        }

        #addBtn {
            padding: 12px 25px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .todo-list {
            list-style: none;
        }

        .todo-item {
            display: flex;
            align-items: center;
            padding: 15px;
            border: 1px solid #e0e0e0;
            border-radius: 5px;
            margin-bottom: 10px;
            background: #f9f9f9;
        }

        .todo-item.completed .todo-text {
            text-decoration: line-through;
            color: #999;
        }

        .todo-checkbox {
            width: 20px;
            height: 20px;
            margin-right: 15px;
        }

        .todo-text {
            flex: 1;
            color: #333;
        }

        .todo-delete {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 3px;
            cursor: pointer;
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 40px;
        }

        .error {
            background: #ffe0e0;
            color: #d32f2f;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>

<body>
<div class="container">
    <h1>📝 TODO App</h1>

    <div class="error" id="error"></div>

    <div class="input-group">
        <input type="text" id="todoInput" placeholder="Add a new task..." autocomplete="off">
        <button id="addBtn">Add</button>
    </div>

    <ul class="todo-list" id="todoList"></ul>
    <div class="empty-state" id="emptyState">No tasks yet. Add one to get started!</div>
    
    <hr style="margin: 30px 0;">

    <div id="exportSection" style="text-align: center;">
        <h3>📤 Export</h3>

        <p id="exportStatus" style="margin: 10px 0; color: #555;">
            Export your todos to a JSON file.
        </p>

        <button id="exportBtn" style="
            padding: 10px 20px;
            background: #4caf50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;">
            Export Todos
        </button>

        <div style="margin-top: 15px;">
            <a id="exportLink" href="#" target="_blank" style="display:none;">
                Download exported file
            </a>
        </div>
    </div>
</div>

<script>
    const todoInput = document.getElementById('todoInput');
    const addBtn = document.getElementById('addBtn');
    const todoList = document.getElementById('todoList');
    const emptyState = document.getElementById('emptyState');
    const errorDiv = document.getElementById('error');

    loadTodos();

    addBtn.addEventListener('click', addTodo);
    todoInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') addTodo();
    });

    async function loadTodos() {
        try {
            const res = await fetch('/api/todos');
            if (!res.ok) throw new Error();
            const todos = await res.json();
            renderTodos(todos);
        } catch (err) {
            showError('Failed to load todos');
        }
    }

    async function addTodo() {
        const title = todoInput.value.trim();
        if (!title) return showError('Please enter a task');

        try {
            await fetch('/api/todos', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ title })
            });

            todoInput.value = '';
            loadTodos();
        } catch {
            showError('Failed to add task');
        }
    }

    async function toggleTodo(id) {
        try {
            await fetch(`/api/todos/${id}`, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ toggle: true })
            });

            loadTodos();
        } catch {
            showError('Failed to update task');
        }
    }

    async function deleteTodo(id) {
        try {
            await fetch(`/api/todos/${id}`, { method: 'DELETE' });
            loadTodos();
        } catch {
            showError('Failed to delete task');
        }
    }

    function renderTodos(todos) {
        todoList.innerHTML = '';

        if (!todos.length) {
            emptyState.style.display = 'block';
            return;
        }

        emptyState.style.display = 'none';

        todos.forEach(todo => {
            const li = document.createElement('li');
            li.className = `todo-item ${todo.completed ? 'completed' : ''}`;

            li.innerHTML = `
                <input type="checkbox"
                    class="todo-checkbox"
                    ${todo.completed ? 'checked' : ''}
                    onchange="toggleTodo('${todo.id}')"
                >

                <span class="todo-text">${escapeHtml(todo.title)}</span>

                <button class="todo-delete"
                    onclick="deleteTodo('${todo.id}')">
                    Delete
                </button>
            `;

            todoList.appendChild(li);
        });
    }

    function showError(msg) {
        errorDiv.textContent = msg;
        errorDiv.style.display = 'block';

        setTimeout(() => {
            errorDiv.style.display = 'none';
        }, 3000);
    }

    function escapeHtml(text) {
        return text.replace(/[&<>"']/g, m => ({
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#039;'
        }[m]));
    }

    const exportBtn = document.getElementById('exportBtn');
const exportStatus = document.getElementById('exportStatus');
const exportLink = document.getElementById('exportLink');

exportBtn.addEventListener('click', exportTodos);

async function exportTodos() {
    exportStatus.textContent = 'Exporting... please wait';
    exportLink.style.display = 'none';

    try {
        const res = await fetch('/api/export');
        if (!res.ok) throw new Error();

        const data = await res.json();

        exportStatus.textContent = `✅ Exported ${data.exported} todos`;
        exportLink.href = data.url;
        exportLink.style.display = 'inline-block';

    } catch (err) {
        exportStatus.textContent = '❌ Export failed';
    }
}
</script>
</body>
</html>
